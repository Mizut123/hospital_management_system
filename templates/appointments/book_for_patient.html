{% extends 'base.html' %}

{% block title %}Book Appointment for Patient - HMS{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto animate-fade-in">
    <div class="bg-white rounded-xl shadow-sm border border-gray-100">
        <div class="px-6 py-4 border-b border-gray-100">
            <h1 class="text-xl font-semibold text-gray-800">Book Appointment for Patient</h1>
            <p class="text-sm text-gray-500 mt-1">Schedule an appointment on behalf of a patient</p>
        </div>

        <form method="post" class="p-6 space-y-6" x-data="appointmentForm()">
            {% csrf_token %}

            <!-- Patient Search -->
            <div x-data="{ search: '', showResults: false, patients: [] }">
                <label class="block text-sm font-medium text-gray-700 mb-2">Patient <span class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="text" x-model="search" @input="searchPatients()" @focus="showResults = true"
                        placeholder="Search by name, phone, or patient number"
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <input type="hidden" name="patient" x-ref="patientId" required>
                </div>
                <div x-show="showResults && patients.length > 0" @click.away="showResults = false"
                    class="absolute z-10 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-lg max-h-60 overflow-auto">
                    <template x-for="patient in patients" :key="patient.id">
                        <div @click="selectPatient(patient)"
                            class="px-4 py-3 hover:bg-gray-50 cursor-pointer border-b border-gray-100 last:border-0">
                            <p class="font-medium text-gray-800" x-text="patient.name"></p>
                            <p class="text-sm text-gray-500" x-text="patient.phone"></p>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Appointment Type -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Appointment Type</label>
                <div class="grid grid-cols-3 gap-3">
                    <label class="cursor-pointer">
                        <input type="radio" name="appointment_type" value="regular" class="sr-only peer" checked>
                        <div class="px-4 py-3 text-center border border-gray-300 rounded-lg peer-checked:bg-blue-500 peer-checked:text-white peer-checked:border-blue-500 hover:bg-gray-50 transition-colors">
                            Regular
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="appointment_type" value="follow_up" class="sr-only peer">
                        <div class="px-4 py-3 text-center border border-gray-300 rounded-lg peer-checked:bg-blue-500 peer-checked:text-white peer-checked:border-blue-500 hover:bg-gray-50 transition-colors">
                            Follow-up
                        </div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="appointment_type" value="emergency" class="sr-only peer">
                        <div class="px-4 py-3 text-center border border-gray-300 rounded-lg peer-checked:bg-red-500 peer-checked:text-white peer-checked:border-red-500 hover:bg-gray-50 transition-colors">
                            Emergency
                        </div>
                    </label>
                </div>
            </div>

            <!-- Department Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Department</label>
                <select name="department" x-model="selectedDepartment" @change="loadDoctors()"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">All Departments</option>
                    {% for dept in departments %}
                    <option value="{{ dept.id }}">{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <!-- Doctor Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Select Doctor <span class="text-red-500">*</span></label>
                <div x-show="doctorLoading" class="py-2 text-sm text-gray-400">Loading doctors…</div>
                <select name="doctor" required x-model="selectedDoctor" @change="fetchSlots()"
                    x-show="!doctorLoading"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                    <option value="">Choose a doctor</option>
                    <template x-for="doc in doctors" :key="doc.id">
                        <option :value="doc.id"
                                x-text="doc.name + (doc.specialization ? ' (' + doc.specialization + ')' : '') + (doc.available_today ? ' ✓' : '')">
                        </option>
                    </template>
                </select>
            </div>

            <!-- Date Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Date <span class="text-red-500">*</span></label>
                <input type="date" name="date" required x-model="selectedDate" @change="fetchSlots()"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Time Slot Selection -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Time Slot <span class="text-red-500">*</span></label>
                <div x-show="loading" class="text-center py-4">
                    <svg class="animate-spin h-6 w-6 mx-auto text-blue-500" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                    </svg>
                </div>
                <div x-show="!loading && slots.length > 0" class="grid grid-cols-4 gap-2">
                    <template x-for="slot in slots" :key="slot">
                        <label class="cursor-pointer">
                            <input type="radio" name="time" :value="slot" class="sr-only peer" required>
                            <div class="px-3 py-2 text-center border border-gray-300 rounded-lg peer-checked:bg-blue-500 peer-checked:text-white peer-checked:border-blue-500 hover:bg-gray-50 transition-colors text-sm">
                                <span x-text="slot"></span>
                            </div>
                        </label>
                    </template>
                </div>
                <div x-show="!loading && slots.length === 0 && selectedDoctor && selectedDate" class="text-center py-4 text-gray-500">
                    No available slots. Please select another date.
                </div>
            </div>

            <!-- Reason -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Reason for Visit</label>
                <textarea name="reason" rows="3" placeholder="Describe the reason for visit"
                    class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
            </div>

            <!-- Submit Button -->
            <div class="flex items-center justify-end space-x-4 pt-4">
                <a href="{% url 'appointments:queue' %}" class="px-6 py-2.5 border border-gray-300 text-gray-700 rounded-lg hover:bg-gray-50 transition-colors">
                    Cancel
                </a>
                <button type="submit" class="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium">
                    Book Appointment
                </button>
            </div>
        </form>
    </div>
</div>

<script>
function appointmentForm() {
    return {
        selectedDepartment: '',
        selectedDoctor: '',
        selectedDate: '',
        doctors: [],
        slots: [],
        loading: false,
        doctorLoading: false,

        async init() { await this.loadDoctors(); },

        async loadDoctors() {
            this.doctorLoading = true;
            this.selectedDoctor = '';
            this.slots = [];
            try {
                const url = '{% url "appointments:doctors_by_dept" %}' +
                            (this.selectedDepartment ? '?dept_id=' + this.selectedDepartment : '');
                const res  = await fetch(url);
                const data = await res.json();
                this.doctors = data.doctors || [];
            } catch (e) { this.doctors = []; }
            this.doctorLoading = false;
        },

        async fetchSlots() {
            if (!this.selectedDoctor || !this.selectedDate) return;
            this.loading = true;
            try {
                const response = await fetch(`{% url 'appointments:get_slots' %}?doctor=${this.selectedDoctor}&date=${this.selectedDate}`);
                const data = await response.json();
                this.slots = data.slots || [];
            } catch (error) {
                this.slots = [];
            }
            this.loading = false;
        }
    }
}
</script>
{% endblock %}
